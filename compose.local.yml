services:
  app:
    build: "."
    depends_on:
      llama-cpp:
        condition: service_healthy
    environment:
      - "BOT_TOKEN=${BOT_TOKEN:?BOT_TOKEN env var must be set}"
      - "INFERENCE_API_URL=http://llama-cpp:8080"
      - "BOT_DATA_DIR=${BOT_DATA_DIR:-/data}"
      - "BOT_PERSISTENCE_FILE=${BOT_PERSISTENCE_FILE:-quick_llm_bot_data}"
      - "INFERENCE_RESPONSE_TIMEOUT=${INFERENCE_RESPONSE_TIMEOUT:-60}"
      - "INFERENCE_API_KEY"
    volumes:
      - "app-data:${BOT_DATA_DIR:-/data}"

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    volumes:
      - "${MODELS_DIR:?MODELS_DIR env var must be set}:/models"
    command: >
        --model "/models/${MODEL_NAME:?MODEL_NAME env var must be set}"
        --host "0.0.0.0"
        --port "8080"
        --no-webui
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      start_period: 20s

volumes:
  app-data:
